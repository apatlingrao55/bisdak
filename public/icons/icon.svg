<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Option 3: Circle with flag bands — clean, modern -->
  <rect width="512" height="512" rx="96" fill="#02090A"/>
  <!-- Outer circle -->
  <circle cx="256" cy="240" r="170" fill="none" stroke="#FCD116" stroke-width="6"/>
  <!-- Top half - blue -->
  <path d="M86 240 A170 170 0 0 1 426 240 Z" fill="#0038A8"/>
  <!-- Bottom half - red -->
  <path d="M86 240 A170 170 0 0 0 426 240 Z" fill="#CE1126"/>
  <!-- Center sun -->
