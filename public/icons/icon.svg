  <!-- 8 sun rays -->
  <g stroke="#FCD116" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="185" x2="256" y2="165"/>
    <line x1="256" y1="295" x2="256" y2="315"/>
    <line x1="201" y1="240" x2="181" y2="240"/>
    <line x1="311" y1="240" x2="331" y2="240"/>
    <line x1="217" y1="201" x2="203" y2="187"/>
    <line x1="295" y1="201" x2="309" y2="187"/>
    <line x1="217" y1="279" x2="203" y2="293"/>
    <line x1="295" y1="279" x2="309" y2="293"/>
  </g>
  <!-- Text below -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="6">BISDAK</text>
</svg>
